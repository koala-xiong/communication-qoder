spring:
  application:
    name: communication-backend

  datasource:
    url: jdbc:mysql://localhost:3306/communication?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:communication-platform-secret-key-must-be-at-least-256-bits-long}
  expiration: 86400000 # 24 hours in milliseconds

# File Upload Configuration
upload:
  path: ${UPLOAD_PATH:./uploads}
  allowed-types: image/jpeg,image/png,image/gif,video/mp4,video/webm
